plugins {
    id 'com.android.application'
}

android {
    namespace 'app.daneshyar.webview'
    compileSdk 34

    defaultConfig {
        applicationId "app.daneshyar.webview"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

// بدون هیچ کتابخانه‌ای = بدون Kotlin = بدون خطای duplicate class
dependencies {
}
