plugins {
    id 'com.android.application'
}

android {
    namespace 'app.daneshyar.webview'
    compileSdk 33

    defaultConfig {
        applicationId "app.daneshyar.webview"
        minSdk 21
        targetSdk 33
        versionCode 2
        versionName "2.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
}
